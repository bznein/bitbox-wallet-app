drivers:
  xcuitest:
    automationName: XCUITest
    platformNames:
      - iOS
      - tvOS
    mainClass: XCUITestDriver
    scripts:
      build-wda: ./scripts/build-wda.js
      open-wda: ./scripts/open-wda.js
      tunnel-creation: ./scripts/tunnel-creation.mjs
      download-wda-sim: ./scripts/download-wda-sim.mjs
    schema:
      $schema: http://json-schema.org/draft-07/schema
      type: object
      properties:
        webdriveragent-port:
          appiumCliDest: wdaLocalPort
          default: 8100
          description: Local port used for communication with WebDriverAgent
          maximum: 65535
          minimum: 1
          type: integer
      additionalProperties: false
      title: XCUITest Driver Configuration
      description: Appium configuration schema for the XCUITest driver.
      $id: driver-xcuitest.json
    doctor:
      checks:
        - ./build/lib/doctor/required-checks.js
        - ./build/lib/doctor/optional-checks.js
    pkgName: appium-xcuitest-driver
    version: 10.1.2
    appiumVersion: ^3.0.0-rc.2
    installType: npm
    installSpec: appium-xcuitest-driver@10.1.2
    installPath: /Users/bznein/Documents/bznein/bitbox-wallet-app/frontends/android/tests/node_modules/appium-xcuitest-driver
  uiautomator2:
    pkgName: appium-uiautomator2-driver
    version: 5.0.3
    installType: npm
    installSpec: uiautomator2
    installPath: /Users/bznein/Documents/bznein/bitbox-wallet-app/frontends/android/tests/node_modules/appium-uiautomator2-driver
    appiumVersion: ^3.0.0-rc.2
    automationName: UiAutomator2
    platformNames:
      - Android
    mainClass: AndroidUiautomator2Driver
    scripts:
      reset: scripts/reset.js
    doctor:
      checks:
        - ./build/lib/doctor/required-checks.js
        - ./build/lib/doctor/optional-checks.js
plugins: {}
schemaRev: 4
